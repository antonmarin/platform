name: test restoring
on: # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#push
  schedule:
    - cron: "15 */4 * * *"
  push: # uncomment to test
jobs:
  test-vw:
    name: Test restoring Vaultwarden backups
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'master' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # https://github.com/actions/checkout
      - name: test-vw
        run: make test-restore-vw
        env:
          POSTGRES_USER: vaultwarden
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: test
          GPG_PASSPHRASE: ${{ secrets.VW_BACKUP_PASSPHRASE }}
          BACKUP_PATH: ${{ secrets.VW_BACKUP_PATH }}
          RCLONE_CONFIG_REMOTE_ENDPOINT: ${{ secrets.VW_BACKUP_ENDPOINT }}
          RCLONE_CONFIG_REMOTE_ACCESS_KEY_ID: ${{ secrets.VW_BACKUP_KEY_ID }}
          RCLONE_CONFIG_REMOTE_SECRET_ACCESS_KEY: ${{ secrets.VW_BACKUP_SECRET }}
  test-port:
    name: Test restoring Portainer backups
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'master' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # https://github.com/actions/checkout
      - name: test-port
        run: make test-restore-port
        env:
          BACKUP_PATH: ${{ vars.PORT_BACKUP_PATH }}
          RCLONE_CONFIG_REMOTE_ENDPOINT: ${{ secrets.VW_BACKUP_ENDPOINT }}
          RCLONE_CONFIG_REMOTE_ACCESS_KEY_ID: ${{ secrets.VW_BACKUP_KEY_ID }}
          RCLONE_CONFIG_REMOTE_SECRET_ACCESS_KEY: ${{ secrets.VW_BACKUP_SECRET }}
  test-keycloak:
    name: Test restoring Keycloak backups
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'master' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # https://github.com/actions/checkout
      - name: test-keycloak
        run: make test-restore-keycloak
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: test
          GPG_PASSPHRASE: ${{ secrets.KEYCLOAK_BACKUP_PASSPHRASE }}
          BACKUP_PATH: ${{ secrets.KEYCLOAK_BACKUP_PATH }}
          RCLONE_CONFIG_REMOTE_ENDPOINT: ${{ secrets.KEYCLOAK_BACKUP_ENDPOINT }}
          RCLONE_CONFIG_REMOTE_ACCESS_KEY_ID: ${{ secrets.KEYCLOAK_BACKUP_KEY_ID }}
          RCLONE_CONFIG_REMOTE_SECRET_ACCESS_KEY: ${{ secrets.KEYCLOAK_BACKUP_SECRET }}
  test-wallabag:
    name: Test restoring wallabag backups
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'master' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # https://github.com/actions/checkout
      - name: test-wallabag
        run: make APP_NAME=wallabag test-restore-pg
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: test
          GPG_PASSPHRASE: ${{ secrets.WALLABAG_BACKUP_PASSPHRASE }}
          BACKUP_PATH: ${{ vars.WALLABAG_BACKUP_PATH }}
          RCLONE_CONFIG_REMOTE_ENDPOINT: ${{ secrets.WALLABAG_BACKUP_ENDPOINT }}
          RCLONE_CONFIG_REMOTE_ACCESS_KEY_ID: ${{ secrets.WALLABAG_BACKUP_KEY_ID }}
          RCLONE_CONFIG_REMOTE_SECRET_ACCESS_KEY: ${{ secrets.WALLABAG_BACKUP_SECRET }}
